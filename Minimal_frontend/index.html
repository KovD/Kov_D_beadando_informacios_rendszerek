<!DOCTYPE html>
<html>
<head><title>Books</title></head>
<body>
<h2>Register Le Books</h2>
<input type="text" id="title" placeholder="Tiltel"><br>
<input type="text" id="author" placeholder="Author"><br>
<input type="text" id="publisher" placeholder="publisher(?)"><br>
<input type="number" id="year" placeholder="Year"><br>
<button onclick="addBook()">Register book</button>

<h2>List of books</h2>
<button onclick="getBooks()">Request the books</button>
<ul id="bookList"></ul>

<script>
    const apiPath = 'rest/books';

    async function getBooks() {
        let res = await fetch(apiPath);
        let books = await res.json();
        let list = document.getElementById('bookList');
        list.innerHTML = '';
        books.forEach(b => {
            list.innerHTML += `<li>${b.title} (${b.author}) - ${b.publisher}, ${b.year}</li>`;
        });
    }

    async function addBook() {
        let book = {
            title: document.getElementById('title').value,
            author: document.getElementById('author').value,
            publisher: document.getElementById('publisher').value,
            year: parseInt(document.getElementById('year').value)
        };

        await fetch(apiPath, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(book)
        });

        getBooks();
    }
</script>
</body>
</html>
